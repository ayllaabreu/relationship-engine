<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aylla & Bruno</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="progress-bar"></div>
<div class="chapter-bar"></div>
<div class="page-transition"></div>

<header class="hero">
    <h1>Aylla & Bruno</h1>
    <button id="foreverBtn" class="forever-btn">forever.exe</button>
</header>

<section class="chapter active" id="cap1">
    <h2>História</h2>
    <div class="gallery">
        <img src="images/foto1.webp" class="lightbox-trigger">
        <img src="images/foto2.webp" class="lightbox-trigger">
    </div>
</section>

<section class="chapter" id="cap2">
    <h2>Memórias</h2>
    <div class="gallery">
        <img src="images/foto3.webp" class="lightbox-trigger">
        <img src="images/foto4.webp" class="lightbox-trigger">
    </div>
</section>

<section class="chapter" id="cap3">
    <h2>Motivos</h2>
    <p>Porque o amor verdadeiro não é acaso. É destino.</p>
</section>

<div class="chapter-controls">
    <button id="prev">←</button>
    <button id="next">→</button>
</div>

<!-- LIGHTBOX -->
<div class="lightbox">
    <span class="close-lightbox">✕</span>
    <img class="lightbox-img">
</div>

<script src="script.js"></script>
</body>
</html>
