<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aylla & Bruno</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="bgMusic" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="music-control" onclick="toggleMusic()">♫</div>

<section class="intro active">
    <div class="glass">
        <h1 class="main-title">Aylla & Bruno</h1>
        <p class="subtitle">A história que começou antes do deploy...</p>
        <button class="start-btn" onclick="startStory()">Assistir</button>
    </div>
</section>

<section class="chapter">
    <div class="glass">
        <h2>Capítulo I</h2>
        <p>Quando eu considero que tudo começou<br><strong>21/11/2024</strong></p>
        <div class="counter" id="counter1"></div>
    </div>
</section>

<section class="chapter">
    <div class="glass">
        <h2>Capítulo II</h2>
        <p>Quando você oficializou<br><strong>04/04/2025</strong></p>
        <div class="counter" id="counter2"></div>
    </div>
</section>

<section class="chapter">
    <div class="glass">
        <h2>Capítulo III</h2>
        <p>No fim, pouco importa a data.<br>
        O que importa é que escolhemos continuar.</p>
    </div>
</section>

<div class="nav-buttons">
    <button onclick="prevChapter()">Voltar</button>
    <button onclick="nextChapter()">Avançar</button>
</div>

<script src="script.js"></script>
</body>
</html>
